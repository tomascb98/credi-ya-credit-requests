server:
  port: 8090

spring:
  application:
    name: "credit-requests"
  devtools:
    add-properties: false
  h2:
    console:
      enabled: true
      path: "/h2"

management:
  endpoints:
    web:
      exposure:
        include: "health,prometheus"
  endpoint:
    health:
      probes:
        enabled: true
  health:
    circuitbreakers:
      enabled: true

cors:
  allowed-origins: "*"   # valor neutro; se sobreescribe en docker

routes:
  paths:
    credit: "/api/v1/credit"

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
  packages-to-scan: co.com.crediya.api
