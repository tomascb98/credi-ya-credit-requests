server:
  port: 8090
spring:
  application:
    name: "credit-requests"
  devtools:
    add-properties: false
  h2:
    console:
      enabled: true
      path: "/h2"
adapters:
  r2dbc:
    host: "localhost"
    port: 5432
    database: "crediya"
    schema: "credit"
    username: "appuser"
    password: "appsecret"
adapter:
  restconsumer:
    timeout: 5000
    url: "http://localhost:8080"
  sqs:
    region: "us-east-2"
    queueUrl: "https://sqs.us-east-2.amazonaws.com/355949199321/notifications"
    loan-capacity:
      region: "us-east-2"
      queueUrl: "https://sqs.us-east-2.amazonaws.com/355949199321/loan_capacity"
management:
  endpoints:
    web:
      exposure:
        include: "health,prometheus"
  endpoint:
    health:
      probes:
        enabled: true
  health:
    circuitbreakers:
      enabled: true
cors:
  allowed-origins: "*"
routes:
  paths:
    credit: "/api/v1/credit"
springdoc:
  api-docs:
    path: "/api-docs"
  swagger-ui:
    path: "/swagger-ui.html"
    operationsSorter: "method"
    tagsSorter: "alpha"
  packages-to-scan: "co.com.crediya.api"
entrypoint:
  sqs:
    region: "us-east-2"
    queueUrl: "https://sqs.us-east-2.amazonaws.com/355949199321/credit-decisions"
    waitTimeSeconds: 20
    maxNumberOfMessages: 10
    visibilityTimeoutSeconds: 10
    numberOfThreads: 1
